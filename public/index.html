<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RME Remote (Linéaire dB)</title>

    <!-- PWA : installable sur l'écran d'accueil, plein écran, thème sombre -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TotalMix Remote">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overscroll-behavior-y: none; /* Empêche le rebond désagréable sur mobile */
        }

        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 360px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #00ff7f; }
        h2 { font-size: 1rem; color: #aaaaaa; margin-top: 0; margin-bottom: 30px; }

        .fader-wrapper {
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
            position: relative;
        }

        .slider-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slider-label {
            font-size: 0.7rem;
            color: #666;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #loading {
            position: absolute;
            color: #00ff7f;
            font-size: 0.9rem;
            z-index: 10;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            /* Slider vertical natif : le drag suit le doigt correctement */
            writing-mode: vertical-lr;
            direction: rtl;
            width: 16px;
            height: 300px;
            background: #333;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            touch-action: none; /* capture le drag vertical au lieu de scroller la page */
            opacity: 0; /* Caché pendant la connexion initiale */
            transition: opacity 0.3s;
        }

        input[type="range"].ready { opacity: 1; }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00ff7f;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.4);
            border: 2px solid #121212;
        }

        input[type="range"]::-moz-range-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00ff7f;
            border: 2px solid #121212;
        }

        /* Slider fin : plus court, thumb plus petit, couleur distincte (cyan) */
        #fineFader {
            height: 220px;
            background: #2a2a2a;
        }
        #fineFader::-webkit-slider-thumb {
            width: 32px;
            height: 32px;
            background: #00e5ff;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
        }
        #fineFader::-moz-range-thumb {
            width: 32px;
            height: 32px;
            background: #00e5ff;
        }
        .slider-label.fine { color: #00e5ff; opacity: 0.7; }

        .display-panel {
            background-color: #121212;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .db-display {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .percent-display {
            font-size: 0.9rem;
            color: #00ff7f;
            font-family: monospace;
        }

        /* --- Panneau processeurs correctifs (CamillaDSP) --- */
        .dsp-panel {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dsp-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #121212;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 14px;
        }

        /* Voyant "en action" : gris = coupé, vert sombre = armé, vert vif
           pulsé = intervient en ce moment. */
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .led.armed { background: #2a5a3f; }
        .led.engaging {
            background: #00ff7f;
            box-shadow: 0 0 10px rgba(0, 255, 127, 0.8);
            animation: ledPulse 0.8s ease-in-out infinite;
        }
        @keyframes ledPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .dsp-name {
            font-size: 0.9rem;
            font-family: monospace;
            color: #ffffff;
        }
        .dsp-state {
            font-size: 0.7rem;
            font-family: monospace;
            color: #888;
            margin-left: auto;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .switch {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        /* la vraie checkbox est masquée, on stylise .switch-track */
        .switch input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-track {
            position: relative;
            width: 52px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .switch-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #888;
            transition: transform 0.2s, background 0.2s;
        }

        .switch input:checked + .switch-track {
            background: rgba(0, 255, 127, 0.25);
        }
        .switch input:checked + .switch-track .switch-thumb {
            transform: translateX(22px);
            background: #00ff7f;
            box-shadow: 0 0 12px rgba(0, 255, 127, 0.5);
        }

        .switch input:disabled + .switch-track {
            opacity: 0.4;
        }
        .switch.disabled { cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>TotalMix Remote</h1>
    <h2>Hardware Output : AN 1/2</h2>
    
    <div class="fader-wrapper">
        <div id="loading">Connexion...</div>
        <div class="slider-column">
            <!-- step="0.1" permet 1000 paliers de précision sous le doigt -->
            <input type="range" id="volumeFader" min="0" max="100" step="0.1" value="0">
            <span class="slider-label">Master</span>
        </div>
        <div class="slider-column">
            <!-- Zoom ±3 dB autour du niveau courant ; recentré à 0 après chaque geste -->
            <input type="range" id="fineFader" min="-3" max="3" step="0.05" value="0">
            <span class="slider-label fine">Fine ±3 dB</span>
        </div>
    </div>
    
    <div class="display-panel">
        <div class="db-display" id="valDb">-- dB</div>
        <div class="percent-display" id="valPercent">-- %</div>
    </div>

    <div class="dsp-panel">
        <div class="dsp-row" id="row-expander">
            <span class="led" id="led-expander"></span>
            <span class="dsp-name">Expander</span>
            <span class="dsp-state" id="state-expander">…</span>
            <label class="switch">
                <input type="checkbox" id="toggle-expander" disabled>
                <span class="switch-track"><span class="switch-thumb"></span></span>
            </label>
        </div>
        <div class="dsp-row" id="row-declipper">
            <span class="led" id="led-declipper"></span>
            <span class="dsp-name">Declipper</span>
            <span class="dsp-state" id="state-declipper">…</span>
            <label class="switch">
                <input type="checkbox" id="toggle-declipper" disabled>
                <span class="switch-track"><span class="switch-thumb"></span></span>
            </label>
        </div>
    </div>
</div>

<script>
    // =======================================================================
    // 1. MOTEUR DSP : MAPPING TOTALMIX & SPLINE CUBIQUE
    // =======================================================================
    
    // Ta table de vérité RME consolidée
    const points = [
        { osc: 0, db: -70.0 }, { osc: 1, db: -64.2 }, { osc: 3, db: -60.5 },
        { osc: 7, db: -55.4 }, { osc: 10, db: -51.3 }, { osc: 20, db: -38.2 },
        { osc: 30, db: -28.1 }, { osc: 40, db: -19.3 }, { osc: 50, db: -12.1 },
        { osc: 60, db: -7.2 }, { osc: 65, db: -5.5 }, { osc: 70, db: -4.0 },
        { osc: 75, db: -2.4 }, { osc: 80, db: -0.7 }, { osc: 82, db: 0.1 }
    ];

    const MIN_DB = -70.0;
    const MAX_DB = 0.0;
    const OSC_FOR_ZERO_DB = 81.776; // Valeur calculée mathématiquement

    // Générateur de la fonction Spline
    function createMonotoneCubicSpline(data) {
        const n = data.length;
        const ms = [], dxs = [];
        for (let i = 0; i < n - 1; i++) {
            dxs.push(data[i+1].osc - data[i].osc);
            ms.push((data[i+1].db - data[i].db) / dxs[i]);
        }
        const c = [ms[0]];
        for (let i = 1; i < n - 1; i++) {
            if (ms[i-1] * ms[i] <= 0) c.push(0);
            else c.push(2 * ms[i-1] * ms[i] / (ms[i-1] + ms[i]));
        }
        c.push(ms[n - 1]);

        return function(x) {
            if (x <= data[0].osc) return data[0].db;
            if (x >= data[n-1].osc) return data[n-1].db;
            let i = 0;
            while (i < n - 1 && x > data[i+1].osc) i++;
            const h = dxs[i], t = (x - data[i].osc) / h;
            const t2 = t * t, t3 = t2 * t;
            return (2*t3 - 3*t2 + 1)*data[i].db + (t3 - 2*t2 + t)*h*c[i] + (-2*t3 + 3*t2)*data[i+1].db + (t3 - t2)*h*c[i+1];
        };
    }

    const splineDb = createMonotoneCubicSpline(points);

    // Trouver l'OSC (0.0 -> 1.0) à partir d'un dB (Recherche Dichotomique inversée)
    function dbToOscFloat(targetDb) {
        if (targetDb <= MIN_DB) return 0.0;
        if (targetDb >= MAX_DB) return OSC_FOR_ZERO_DB / 100.0;

        let low = 0.0, high = OSC_FOR_ZERO_DB, mid;
        for (let i = 0; i < 50; i++) {
            mid = (low + high) / 2;
            if (splineDb(mid) < targetDb) low = mid; else high = mid;
        }
        return mid / 100.0; 
    }

    // Trouver le dB à partir de l'OSC brut venant du serveur Node.js (0.0 -> 1.0)
    function oscFloatToDb(oscFloat) {
        const oscPercent = oscFloat * 100.0;
        if (oscPercent <= 0) return MIN_DB;
        if (oscPercent >= OSC_FOR_ZERO_DB) return MAX_DB;
        return splineDb(oscPercent);
    }

    // =======================================================================
    // 2. LOGIQUE UI & RESEAU
    // =======================================================================

    const fader = document.getElementById('volumeFader');
    const fineFader = document.getElementById('fineFader');
    const dbDisplay = document.getElementById('valDb');
    const percentDisplay = document.getElementById('valPercent');
    const loading = document.getElementById('loading');

    const FINE_RANGE_DB = 3; // Le slider fin couvre ±3 dB autour du niveau courant

    let isSending = false;
    let isDragging = false; // Vrai tant qu'un des deux sliders est manipulé

    // Conversions entre position du fader principal (0-100) et dB perçu
    const percentToDb = (p) => MIN_DB + (p / 100) * (MAX_DB - MIN_DB);
    const dbToPercent = (db) => ((db - MIN_DB) / (MAX_DB - MIN_DB)) * 100;

    // --- RETOUR HAPTIQUE (mobile) ---
    const canVibrate = 'vibrate' in navigator;
    let lastVibrate = 0;
    function haptic() {
        if (!canVibrate) return;
        const now = Date.now();
        if (now - lastVibrate < 40) return; // throttle : évite le buzz continu pendant un drag
        lastVibrate = now;
        navigator.vibrate(8);
    }

    // Mise à jour de l'affichage HTML
    function updateDisplay(sliderValue) {
        const percent = parseFloat(sliderValue);
        const currentDb = MIN_DB + (percent / 100) * (MAX_DB - MIN_DB);
        
        // Arrondi à une décimale, gère l'affichage propre du 0.0 absolu
        const displayDb = currentDb >= -0.05 ? "0.0" : currentDb.toFixed(1);
        
        dbDisplay.innerText = `${displayDb} dB`;
        percentDisplay.innerText = `Course: ${percent.toFixed(1)} %`;
        return currentDb;
    }

    // --- ENVOI DES DONNÉES AU SERVEUR (Tu bouges le potard web) ---
    async function sendVolume(sliderValue) {
        const percent = parseFloat(sliderValue);
        const targetDb = MIN_DB + (percent / 100) * (MAX_DB - MIN_DB);
        
        const oscFloat = dbToOscFloat(targetDb);
        const valString = oscFloat.toFixed(4); // 4 décimales requises pour RME
        
        try {
            await fetch(`/api/volume?val=${valString}`);
        } catch (err) {
            console.error('Erreur réseau:', err);
        }
    }

    // Gestion du tactile (très important pour que le temps réel ne fasse pas trembler le bouton sous ton doigt)
    fader.addEventListener('mousedown', () => isDragging = true);
    fader.addEventListener('touchstart', () => isDragging = true, {passive: true});
    
    const stopDragging = () => {
        if (isDragging) {
            isDragging = false;
            sendVolume(fader.value); 
        }
    };
    fader.addEventListener('mouseup', stopDragging);
    fader.addEventListener('touchend', stopDragging);

    // Mouvement en direct (fader principal)
    fader.addEventListener('input', (e) => {
        updateDisplay(e.target.value);
        haptic();
        if (!isSending) {
            isSending = true;
            sendVolume(e.target.value).finally(() => isSending = false);
        }
    });

    // --- SLIDER FIN (zoom ±3 dB autour du niveau courant) ---
    let fineBaseDb = 0; // Niveau capturé au début du geste ; le slider applique un offset

    const startFine = () => {
        isDragging = true;
        fineBaseDb = percentToDb(parseFloat(fader.value));
    };
    fineFader.addEventListener('mousedown', startFine);
    fineFader.addEventListener('touchstart', startFine, { passive: true });

    fineFader.addEventListener('input', () => {
        const offsetDb = parseFloat(fineFader.value); // ∈ [-3, +3]
        const newDb = Math.max(MIN_DB, Math.min(MAX_DB, fineBaseDb + offsetDb));
        const percent = dbToPercent(newDb);

        fader.value = percent;      // le fader principal reflète le réglage fin
        updateDisplay(percent);
        haptic();
        if (!isSending) {
            isSending = true;
            sendVolume(percent).finally(() => isSending = false);
        }
    });

    const stopFine = () => {
        if (isDragging) {
            isDragging = false;
            sendVolume(fader.value); // valeur finale garantie
        }
        fineFader.value = 0; // recentre pour permettre un nouvel ajustement
    };
    fineFader.addEventListener('mouseup', stopFine);
    fineFader.addEventListener('touchend', stopFine);

    // --- RECEPTION DU SERVEUR (Tu bouges TotalMix avec la souris) ---
    const evtSource = new EventSource('/api/stream');
    
    evtSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const oscFloat = data.volume;
        
        if (!isDragging) {
            // Conversion : Valeur OSC -> dB Perçu -> Pourcentage du fader web (0-100)
            const actualDb = oscFloatToDb(oscFloat);
            const rawPercent = ((actualDb - MIN_DB) / (MAX_DB - MIN_DB)) * 100;
            
            // On s'assure que le potard web ne sort pas du cadre
            const safePercent = Math.max(0, Math.min(100, rawPercent));
            
            fader.value = safePercent;
            fineFader.value = 0; // le slider fin reste centré sur le niveau courant
            updateDisplay(safePercent);
        }

        loading.style.display = 'none';
        fader.classList.add('ready');
        fineFader.classList.add('ready');
    };

    evtSource.onerror = () => {
        dbDisplay.innerText = "Hors ligne";
        percentDisplay.innerText = "Reconnexion...";
        fader.classList.remove('ready');
        fineFader.classList.remove('ready');
        loading.style.display = 'block';
    };

    // =======================================================================
    // 3. PROCESSEURS CORRECTIFS CAMILLADSP
    //    Pour chacun : un interrupteur (activer / couper) et un voyant qui
    //    s'allume quand il *intervient* (expansion appliquée / clips réparés),
    //    pour décider d'un coup d'œil s'il faut le garder ou le couper.
    // =======================================================================

    const PROCS = ['expander', 'declipper'];
    const els = {};
    const busy = {}; // vrai pendant un aller-retour serveur (toggle en cours)

    PROCS.forEach((p) => {
        els[p] = {
            led: document.getElementById(`led-${p}`),
            state: document.getElementById(`state-${p}`),
            toggle: document.getElementById(`toggle-${p}`),
        };
        busy[p] = false;
    });

    // Applique l'état d'un processeur à sa ligne (case + voyant + libellé).
    function renderProc(p, s) {
        const e = els[p];
        const sw = e.toggle.closest('.switch');

        if (!s || !s.available) {
            e.toggle.disabled = true;
            if (!busy[p]) e.toggle.checked = false;
            e.led.className = 'led';
            e.state.textContent = 'hors ligne';
            sw.classList.add('disabled');
            return;
        }
        if (!s.found) {
            e.toggle.disabled = true;
            e.toggle.checked = false;
            e.led.className = 'led';
            e.state.textContent = 'absent';
            sw.classList.add('disabled');
            return;
        }

        sw.classList.remove('disabled');
        if (!busy[p]) {
            e.toggle.disabled = false;
            e.toggle.checked = !!s.active;
        }

        if (s.engaging) {
            e.led.className = 'led engaging';
            e.state.textContent = 'en action';
        } else if (s.active) {
            e.led.className = 'led armed';
            e.state.textContent = 'actif';
        } else {
            e.led.className = 'led';
            e.state.textContent = 'coupé';
        }
    }

    // Sondage périodique : rafraîchit cases ET voyants (état + activité).
    async function loadStatus() {
        try {
            const r = await fetch('/api/dsp/status');
            const st = await r.json();
            PROCS.forEach((p) => renderProc(p, st.available ? st[p] : null));
        } catch (e) {
            PROCS.forEach((p) => renderProc(p, null));
        }
    }

    // Bascule un processeur quand on touche son interrupteur.
    PROCS.forEach((p) => {
        els[p].toggle.addEventListener('change', async () => {
            const desired = els[p].toggle.checked;
            busy[p] = true;
            els[p].toggle.disabled = true;
            els[p].state.textContent = '…';
            try {
                const r = await fetch(`/api/dsp/${p}?on=${desired}`, { method: 'POST' });
                const s = await r.json();
                busy[p] = false;
                // Réponse du toggle : pas de champ "engaging" -> le prochain
                // sondage (<1 s) rallumera le voyant si besoin.
                renderProc(p, {
                    available: s.available !== false,
                    found: s.found !== false,
                    active: s.active,
                    engaging: false,
                });
            } catch (e) {
                busy[p] = false;
                renderProc(p, null);
            }
        });
    });

    loadStatus();
    setInterval(loadStatus, 1000); // voyants d'activité + reflète les changements externes
</script>

</body>
</html>
